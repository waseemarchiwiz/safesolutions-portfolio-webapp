name: Build and Push to Azure Container Registry

on:
  push:
    branches:
      - "main"
      - "staging"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      # Set environment-specific variables
      - name: Set Environment Variables
        id: set-env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "IMAGE_TAG=prod-latest" >> $GITHUB_ENV           
          elif [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            echo "IMAGE_TAG=staging-latest" >> $GITHUB_ENV          
          fi

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_ENDPOINT }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.ACR_ENDPOINT }}/safesolution-portfolio:${{ env.IMAGE_TAG }}
          file: ./Dockerfile
          secrets: |
            NEXT_PUBLIC_TINYMCE_API_URL=${{ secrets.NEXT_PUBLIC_TINYMCE_API_URL }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}         
            BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
            MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}
            MAIL_FROM_NAME=${{ secrets.MAIL_FROM_NAME }}
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
